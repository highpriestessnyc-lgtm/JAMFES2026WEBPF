<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JAMFes2026">
<title>JAMFes2026 — デジタルパンフレット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: "Helvetica Neue", Arial, sans-serif;
  overflow-x: hidden;
  user-select: none;
}

header {
  width: 100%;
  background: #0a0a0a;
  border-bottom: 1px solid rgba(255,230,0,0.25);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 10px;
  flex-wrap: wrap;
}

.logo {
  font-size: 0.95rem;
  font-weight: 700;
  color: #FFE600;
  letter-spacing: 0.06em;
  white-space: nowrap;
}

.controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,230,0,0.15); border-color: #FFE600; color: #FFE600; }
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }

.page-input {
  width: 46px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  text-align: center;
  padding: 5px 4px;
  border-radius: 4px;
  font-size: 0.8rem;
}

.page-total {
  color: rgba(255,255,255,0.4);
  font-size: 0.8rem;
  white-space: nowrap;
}

/* ===== VIEWER ===== */
#viewer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px 0 70px;
  width: 100%;
  position: relative;
}

/* 左右タップゾーン */
.tap-zone {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 18%;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.tap-zone.left  { left: 0; }
.tap-zone.right { right: 0; }

.tap-arrow {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,230,0,0.15);
  border: 1px solid rgba(255,230,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,230,0,0.6);
  font-size: 1rem;
  opacity: 0;
  transition: opacity 0.2s;
}
.tap-zone:hover .tap-arrow,
.tap-zone:active .tap-arrow { opacity: 1; }

/* ===== FLIP ===== */
.flip-stage { perspective: 1800px; position: relative; }

.flip-card {
  position: relative;
  transform-style: preserve-3d;
}

.flip-card.flip-next {
  animation: flipNext 0.42s cubic-bezier(0.45,0,0.2,1) forwards;
}
.flip-card.flip-prev {
  animation: flipPrev 0.42s cubic-bezier(0.45,0,0.2,1) forwards;
}

@keyframes flipNext {
  0%   { transform: rotateY(0deg);   }
  45%  { transform: rotateY(-92deg); }
  100% { transform: rotateY(0deg);   }
}
@keyframes flipPrev {
  0%   { transform: rotateY(0deg);  }
  45%  { transform: rotateY(92deg); }
  100% { transform: rotateY(0deg);  }
}

#page-img {
  display: block;
  max-width: 100vw;
  max-height: calc(100vh - 50px - 58px - 40px);
  width: auto;
  height: auto;
  border-radius: 3px;
  box-shadow: 6px 6px 30px rgba(0,0,0,0.7);
}

.flip-shade {
  position: absolute;
  inset: 0;
  border-radius: 3px;
  background: linear-gradient(105deg, rgba(0,0,0,0) 20%, rgba(20,12,0,0.65) 50%, rgba(0,0,0,0) 80%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.05s;
}
.flip-shade.show { opacity: 1; }

/* ===== 虫眼鏡ボタン ===== */
#zoom-btn {
  position: fixed;
  bottom: 66px;
  right: 16px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,230,0,0.9);
  color: #000;
  font-size: 1.3rem;
  border: none;
  cursor: pointer;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  transition: transform 0.15s;
}
#zoom-btn:active { transform: scale(0.92); }

/* ===== モーダル（拡大表示）===== */
#modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#modal.open { display: flex; }

#modal-img {
  max-width: 100%;
  max-height: 90vh;
  touch-action: pinch-zoom;
  border-radius: 3px;
}

#modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  color: #fff;
  font-size: 2rem;
  cursor: pointer;
  background: none;
  border: none;
  line-height: 1;
  opacity: 0.7;
}
#modal-close:hover { opacity: 1; }

.modal-hint {
  position: absolute;
  bottom: 20px;
  color: rgba(255,255,255,0.3);
  font-size: 0.7rem;
  letter-spacing: 0.1em;
}

/* ===== THUMBNAIL BAR ===== */
#thumbbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 58px;
  background: rgba(8,8,8,0.97);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 6px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  z-index: 50;
}
#thumbbar::-webkit-scrollbar { display: none; }

.thumb {
  flex-shrink: 0;
  width: 30px;
  height: 42px;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 2px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb:hover { border-color: rgba(255,230,0,0.5); transform: scale(1.12); }
.thumb.active { border-color: #FFE600; box-shadow: 0 0 0 1px #FFE600; }
.thumb-num {
  position: absolute;
  bottom: 1px; right: 2px;
  font-size: 0.4rem;
  color: rgba(255,255,255,0.5);
  text-shadow: 0 0 3px #000;
}

/* ===== LOADING ===== */
#loading {
  position: fixed;
  inset: 0;
  background: #0f0f0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 999;
  transition: opacity 0.4s;
}
#loading.hide { opacity: 0; pointer-events: none; }
.ld-title { color: #FFE600; font-size: 1.5rem; font-weight: 700; letter-spacing: 0.1em; }
.ld-sub { color: rgba(255,255,255,0.35); font-size: 0.75rem; letter-spacing: 0.1em; }
.ld-bar-wrap { width: 200px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; overflow: hidden; }
.ld-bar { height: 100%; background: #FFE600; width: 0%; border-radius: 1px; transition: width 0.2s; }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">JAMFes 2026</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-sub" id="ld-sub">パンフレットを準備中...</div>
</div>

<header>
  <div class="logo">📋 JAMFes2026</div>
  <div class="controls">
    <button class="btn" id="btn-first" onclick="gotoPage(1)">|◀</button>
    <button class="btn" id="btn-prev"  onclick="gotoPage(cur-1)">◀</button>
    <input  class="page-input" id="pg-input" type="number" min="1" value="1"
            onchange="gotoPage(parseInt(this.value))">
    <span class="page-total">/ <span id="pg-total">—</span></span>
    <button class="btn" id="btn-next"  onclick="gotoPage(cur+1)">▶</button>
    <button class="btn" id="btn-last"  onclick="gotoPage(PAGES.length)">▶|</button>
  </div>
</header>

<div id="viewer">
  <!-- 左タップゾーン -->
  <div class="tap-zone left" onclick="gotoPage(cur-1)">
    <div class="tap-arrow">◀</div>
  </div>
  <!-- 右タップゾーン -->
  <div class="tap-zone right" onclick="gotoPage(cur+1)">
    <div class="tap-arrow">▶</div>
  </div>

  <div class="flip-stage" id="stage">
    <div class="flip-card" id="flip-card">
      <img id="page-img" src="" alt="page">
      <div class="flip-shade" id="shade"></div>
    </div>
  </div>
</div>

<!-- 虫眼鏡ボタン -->
<button id="zoom-btn" onclick="openModal()">🔍</button>

<!-- 拡大モーダル -->
<div id="modal">
  <button id="modal-close" onclick="closeModal()">✕</button>
  <img id="modal-img" src="" alt="拡大">
  <div class="modal-hint">ピンチで拡大 / タップで閉じる</div>
</div>

<div id="thumbbar"></div>

<script>
const PAGES = [
  'pages/p01.jpg',
  'pages/p02.jpg',
  'pages/p03.jpg',
  'pages/p04.jpg',
  'pages/p05.jpg',
  'pages/p06.jpg',
  'pages/p07.jpg',
  'pages/p08.jpg',
  'pages/p09.jpg',
  'pages/p10.jpg',
  'pages/p11.jpg',
  'pages/p12.jpg',
  'pages/p13.jpg',
  'pages/p14.jpg',
  'pages/p15.jpg',
  'pages/p16.jpg',
  'pages/p17.jpg',
  'pages/p18.jpg',
  'pages/p19.jpg',
  'pages/p20.jpg',
  'pages/p21.jpg',
  'pages/p22.jpg',
  'pages/p23.jpg',
  'pages/p24.jpg',
  'pages/p25.jpg',
  'pages/p26.jpg',
  'pages/p27.jpg',
  'pages/p28.jpg',
  'pages/p29.jpg',
  'pages/p30.jpg',
  'pages/p31.jpg',
  'pages/p32.jpg',
  'pages/p33.jpg',
  'pages/p34.jpg',
  'pages/p35.jpg',
  'pages/p36.jpg',
  'pages/p37.jpg',
  'pages/p38.jpg',
  'pages/p39.jpg',];

let cur = 1;
let busy = false;

const img      = document.getElementById("page-img");
const card     = document.getElementById("flip-card");
const shade    = document.getElementById("shade");
const pgInput  = document.getElementById("pg-input");
const pgTotal  = document.getElementById("pg-total");
const ldBar    = document.getElementById("ld-bar");
const ldSub    = document.getElementById("ld-sub");
const loading  = document.getElementById("loading");
const thumbbar = document.getElementById("thumbbar");
const modal    = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");

pgTotal.textContent = PAGES.length;

// ===== PRELOAD =====
let loaded = 0;
PAGES.forEach((src, i) => {
  const im = new Image();
  im.onload = () => {
    loaded++;
    const pct = Math.round(loaded / PAGES.length * 100);
    ldBar.style.width = pct + "%";
    ldSub.textContent = "読み込み中... " + pct + "%";
    if (loaded === PAGES.length) {
      setTimeout(() => {
        loading.classList.add("hide");
        setTimeout(() => loading.style.display = "none", 400);
      }, 200);
    }
    if (i < 8) buildThumb(i);
  };
  im.src = src;
});

// ===== THUMBNAILS =====
function buildThumb(i) {
  if (thumbbar.querySelector("[data-i=\"" + i + "\"]")) return;
  const div = document.createElement("div");
  div.className = "thumb" + (i === 0 ? " active" : "");
  div.dataset.i = i;
  const ti = new Image();
  ti.src = PAGES[i];
  div.appendChild(ti);
  const num = document.createElement("div");
  num.className = "thumb-num";
  num.textContent = i + 1;
  div.appendChild(num);
  div.onclick = () => gotoPage(i + 1);
  thumbbar.appendChild(div);
}
setTimeout(() => { for (let i = 8; i < PAGES.length; i++) buildThumb(i); }, 1000);

// ===== GOTO PAGE =====
function gotoPage(n) {
  if (busy) return;
  n = Math.max(1, Math.min(PAGES.length, n));
  if (n === cur) return;
  const dir = n > cur ? "next" : "prev";
  busy = true;
  card.classList.add("flip-" + dir);
  shade.classList.add("show");
  setTimeout(() => {
    img.src = PAGES[n - 1];
    shade.classList.remove("show");
  }, 200);
  setTimeout(() => {
    card.classList.remove("flip-next", "flip-prev");
    cur = n;
    pgInput.value = n;
    document.getElementById("btn-prev").disabled  = n <= 1;
    document.getElementById("btn-first").disabled = n <= 1;
    document.getElementById("btn-next").disabled  = n >= PAGES.length;
    document.getElementById("btn-last").disabled  = n >= PAGES.length;
    document.querySelectorAll(".thumb").forEach(t => {
      t.classList.toggle("active", parseInt(t.dataset.i) === n - 1);
    });
    const at = thumbbar.querySelector(".thumb[data-i=\"" + (n-1) + "\"]");
    if (at) at.scrollIntoView({ inline: "center", behavior: "smooth" });
    busy = false;
  }, 430);
}

// ===== 虫眼鏡モーダル =====
function openModal() {
  modalImg.src = PAGES[cur - 1];
  modal.classList.add("open");
}
function closeModal() {
  modal.classList.remove("open");
}
modal.addEventListener("click", e => {
  if (e.target === modal) closeModal();
});

// ===== INIT =====
img.src = PAGES[0];
document.getElementById("btn-prev").disabled  = true;
document.getElementById("btn-first").disabled = true;

// ===== KEYBOARD =====
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") gotoPage(cur + 1);
  if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   gotoPage(cur - 1);
  if (e.key === "Home") gotoPage(1);
  if (e.key === "End")  gotoPage(PAGES.length);
  if (e.key === "Escape") closeModal();
});

// ===== TOUCH SWIPE（中央エリアのみ）=====
let tx = 0, ty = 0;
document.getElementById("stage").addEventListener("touchstart", e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });

document.getElementById("stage").addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 80) {
    gotoPage(cur + (dx < 0 ? 1 : -1));
  }
}, { passive: true });
</script>
</body>
</html>
